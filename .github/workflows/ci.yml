name: Playwright Parallel CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
   # 1️⃣ Parallel Test Jobs
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4] # 4 shards running in parallel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shard }}/4 --workers=2

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report/

  # 2️⃣ Merge Reports Job
  merge-reports:
    needs: [test]      # Wait until all test shards finish
    runs-on: ubuntu-latest
    if: always()       # Run even if one shard fails
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Merge reports
        run: |
          echo "Folders downloaded:"
          ls -R all-reports
          npx playwright merge-reports --reporter html $(find all-reports -type d -name 'playwright-report')
          echo "Merged report created in playwright-report/"

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: merged-html-report
          path: playwright-report/
